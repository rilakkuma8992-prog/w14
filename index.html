<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排放交易計畫的邊境調整</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 引入 Playfair Display 與 思源明體 的細字重 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 極簡藝廊色調 */
            --bg-color: #F7F5F0; 
            --text-color: #2C2C2A; 
            --border-color: #D6D4CD; 
            --highlight-bg: #F0EFEB; 
            --accent-color: #8C8A81;
        }

        /* 自訂文字反白（選取）樣式 */
        ::selection {
            background-color: var(--text-color); /* 採用深色背景 */
            color: #FFFFFF; /* 白色字體 */
        }
        
        /* 針對較舊版 Firefox 瀏覽器的相容性設定 */
        ::-moz-selection {
            background-color: var(--text-color);
            color: #FFFFFF;
        }

        body {
            font-family: 'Playfair Display', 'Noto Serif TC', serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 30%, #FFFFFF 0%, var(--bg-color) 100%);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 300;
            letter-spacing: 0.05em;
            overflow-x: hidden;
            /* 全站預設鼠標：典雅的手繪貓掌印 */
            cursor: url("data:image/svg+xml,%3Csvg width='32' height='32' viewBox='0 0 32 32' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%238C8A81' stroke-width='1.2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M 10,18 Q 13,15 16,16 Q 19,15 22,18 Q 23,23 16,24 Q 9,23 10,18 Z' /%3E%3Cellipse cx='8' cy='13' rx='1.5' ry='2' transform='rotate(-30 8 13)'/%3E%3Cellipse cx='12.5' cy='9' rx='1.5' ry='2' transform='rotate(-10 12.5 9)'/%3E%3Cellipse cx='19.5' cy='9' rx='1.5' ry='2' transform='rotate(10 19.5 9)'/%3E%3Cellipse cx='24' cy='13' rx='1.5' ry='2' transform='rotate(30 24 13)'/%3E%3C/g%3E%3C/svg%3E") 16 16, auto;
        }

        /* 全站極細緻紙張紋理 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9999;
            /* 將中心區塊的細緻礦石與再生紙紋理全局延展至全站 */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='fineNoise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23fineNoise)' opacity='0.12'/%3E%3C/svg%3E");
            mix-blend-mode: multiply; 
        }

        /* 針對所有互動元素（按鈕）的懸浮鼠標 */
        button, a, .nav-btn, .dropdown-btn {
            cursor: url("data:image/svg+xml,%3Csvg width='32' height='32' viewBox='0 0 32 32' xmlns='http://www.w3.org/2000/svg'%3E%3Cg transform='translate(16,16) scale(1.1) rotate(25) translate(-16,-16)' fill='none' stroke='%232C2C2A' stroke-width='1.5' stroke-dasharray='2 2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M 10,18 Q 13,15 16,16 Q 19,15 22,18 Q 23,23 16,24 Q 9,23 10,18 Z' /%3E%3Cellipse cx='8' cy='13' rx='1.5' ry='2' transform='rotate(-30 8 13)'/%3E%3Cellipse cx='12.5' cy='9' rx='1.5' ry='2' transform='rotate(-10 12.5 9)'/%3E%3Cellipse cx='19.5' cy='9' rx='1.5' ry='2' transform='rotate(10 19.5 9)'/%3E%3Cellipse cx='24' cy='13' rx='1.5' ry='2' transform='rotate(30 24 13)'/%3E%3C/g%3E%3C/svg%3E") 16 16, pointer !important;
        }

        /* 讓邊角插圖擁有手繪抖動感 */
        .sketchy-svg {
            filter: url(#hand-drawn-filter);
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* --- 修正與增強：貓咪專屬微動畫 --- */
        @keyframes gentleBreathe {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-4px); } 
        }

        @keyframes tailWagRight {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(20deg); } 
        }

        .sitting-lynx {
            transform-box: view-box;
            transform-origin: center bottom;
            animation: gentleBreathe 5s ease-in-out infinite; 
        }

        .cat-tail-right {
            transform-box: view-box;
            transform-origin: 38px 76px;
            animation: tailWagRight 5s ease-in-out infinite;
        }

        /* 固定於頁面四周的手繪裝飾插圖 */
        .fixed-decor {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0.85;
            color: var(--text-color);
        }

        .decor-left {
            top: 45%;
            left: 3vw;
            width: 120px;
            transform: translateY(-50%);
            /* 允許內容溢出，讓貓咪能從 SVG 外側無縫走入 */
            overflow: visible; 
        }

        .decor-right {
            bottom: 5vh;
            right: 4vw;
            width: 90px;
        }

        /* 極簡風格的外框 */
        .frame {
            position: relative;
            width: 90%;
            max-width: 900px;
            min-height: 85vh;
            margin: 3rem auto;
            padding: 4rem 3rem;
            display: flex;
            flex-direction: column;
            /* 維持與外圍一致的暖米白色調 */
            background-color: #FAF9F6;
            /* 紋理已統一由 body::before 全局無縫覆蓋，故移除獨立背景圖以避免色彩疊加過暗 */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.035), 0 2px 8px rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-color);
            z-index: 10;
        }

        /* 標題樣式 */
        h1 {
            font-size: clamp(2.5rem, 6vw, 3.2rem);
            letter-spacing: 0.15em;
            font-weight: 400;
            text-align: center;
            margin-bottom: 1rem;
        }

        .header-icon {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
            opacity: 0.85;
            transition: opacity 0.5s ease;
        }

        .header-icon:hover {
            opacity: 1;
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-align: center;
            margin-bottom: 4rem;
            color: var(--accent-color);
        }

        /* 互動導覽列 */
        .nav-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 2.5rem;
            margin-bottom: 4rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }

        .nav-btn {
            background: transparent;
            color: var(--accent-color);
            border: none;
            padding: 0 0 0.5rem 0;
            font-family: inherit;
            font-size: 0.95rem;
            letter-spacing: 0.1em;
            cursor: pointer;
            position: relative;
            transition: color 0.4s ease;
        }

        .nav-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0%;
            height: 1px;
            background-color: var(--text-color);
            transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .nav-btn:hover, .nav-btn.active {
            color: var(--text-color);
        }

        .nav-btn:hover::after, .nav-btn.active::after {
            width: 100%;
        }

        /* 下拉式選單 */
        .nav-item {
            position: relative;
            padding-bottom: 1.5rem;
            margin-bottom: -1.5rem;
        }

        .dropdown-content {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(15px);
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.05);
            min-width: 240px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            z-index: 100;
            padding: 0.5rem 0;
            display: flex;
            flex-direction: column;
        }

        .nav-item:hover .dropdown-content {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .dropdown-btn {
            background: transparent;
            border: none;
            padding: 0.8rem 1.5rem;
            color: var(--accent-color);
            font-family: inherit;
            font-size: 0.9rem;
            letter-spacing: 0.08em;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .dropdown-btn::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0px;
            background-color: var(--text-color);
            transition: width 0.3s ease;
        }

        .dropdown-btn:hover, .dropdown-btn.active {
            background-color: var(--highlight-bg);
            color: var(--text-color);
            padding-left: 2rem;
        }

        .dropdown-btn:hover::before, .dropdown-btn.active::before {
            width: 3px;
        }

        /* 內容區域 */
        .content-area {
            flex-grow: 1;
            max-width: 760px;
            margin: 0 auto;
            line-height: 2;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            font-size: 1.35rem;
            margin-bottom: 2rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            color: var(--text-color);
        }

        .point-list {
            list-style-type: none;
            padding: 0;
            margin: 2rem 0;
        }

        .point-list li {
            position: relative;
            padding-left: 2rem;
            margin-bottom: 1.5rem;
            transition: transform 0.3s ease, color 0.3s ease;
        }

        .point-list li::before {
            content: '—';
            position: absolute;
            left: 0;
            color: var(--accent-color);
            transition: color 0.3s ease;
        }

        .point-list li:hover {
            transform: translateX(8px);
        }

        .point-list li:hover::before {
            color: var(--text-color);
        }

        /* 互動效果：重點提示區塊 */
        .highlight-box {
            position: relative;
            padding: 2.5rem 3rem;
            margin: 4rem 1rem;
            background-color: transparent;
            border: 1px solid var(--accent-color);
            border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .highlight-box:hover {
            border-color: var(--text-color);
            box-shadow: 4px 6px 20px rgba(0, 0, 0, 0.04);
            transform: translateY(-2px);
        }

        .highlight-box .box-title {
            font-family: inherit;
            font-style: normal;
            font-weight: 600; 
            font-size: 1.15rem;
            display: block;
            margin-bottom: 0.8rem;
            color: var(--text-color);
            letter-spacing: 0.1em;
        }

        .highlight-box strong {
            font-weight: 600;
        }

        .highlight-box::before {
            content: '';
            position: absolute;
            top: -35px;
            left: -30px;
            width: 75px;
            height: 75px;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='60' cy='60' r='38' fill='%23F7F5F0'/%3E%3Cpath d='M60,60 C40,25 50,5 60,5 C70,5 80,25 60,60 Z' fill='none' stroke='%238C8A81' stroke-width='1.5' /%3E%3Cpath d='M60,60 C25,60 5,75 10,95 C15,115 45,90 60,60 Z' fill='none' stroke='%238C8A81' stroke-width='1.5' /%3E%3Cpath d='M60,60 C95,60 115,75 110,95 C105,115 75,90 60,60 Z' fill='none' stroke='%238C8A81' stroke-width='1.5' /%3E%3Cpath d='M60,60 C45,80 45,115 60,115 C75,115 75,80 60,60 Z' fill='none' stroke='%238C8A81' stroke-width='1.5' /%3E%3Ccircle cx='60' cy='64' r='3' fill='%238C8A81'/%3E%3Cpath d='M60,60 L60,40' fill='none' stroke='%238C8A81' stroke-width='1' /%3E%3C/svg%3E");
            background-size: contain;
            background-repeat: no-repeat;
            transition: all 0.5s ease;
            z-index: 2;
        }

        .highlight-box::after {
            content: '';
            position: absolute;
            bottom: -20px;
            right: -15px;
            width: 45px;
            height: 45px;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='50' cy='50' r='22' fill='%23F7F5F0'/%3E%3Cpath d='M20,80 C20,40 60,20 80,20 C80,20 70,60 20,80 Z' fill='none' stroke='%238C8A81' stroke-width='1.5'/%3E%3Cpath d='M50,50 C40,40 30,40 20,45' fill='none' stroke='%238C8A81' stroke-width='1'/%3E%3C/svg%3E");
            background-size: contain;
            background-repeat: no-repeat;
            transition: all 0.5s ease;
            z-index: 2;
        }

        .highlight-box:hover::before, .highlight-box:hover::after {
            transform: scale(1.05) rotate(-3deg);
            filter: brightness(0.6);
        }

        .footer-info {
            display: flex;
            justify-content: space-between;
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent-color);
            font-family: 'Playfair Display', serif;
        }
        
        @media (max-width: 1100px) {
            .decor-left, .decor-right { opacity: 0.12; }
        }

        @media (max-width: 640px) {
            .frame { padding: 2rem 1.5rem; }
            .nav-container { gap: 1rem; }
            .footer-info {
                flex-direction: column;
                align-items: center;
                gap: 1rem;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position:absolute;z-index:-1;">
        <defs>
            <filter id="hand-drawn-filter" x="-10%" y="-10%" width="120%" height="120%">
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G" />
            </filter>
        </defs>
    </svg>

    <!-- 固定位置邊角插畫：左側植物與小貓 -->
    <svg class="fixed-decor decor-left sketchy-svg" viewBox="0 0 120 200" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M0,170 L50,170 M0,180 L60,180" />
        <path d="M50,170 L50,180" />
        <path d="M40,170 Q25,110 50,70 Q60,40 45,20" />
        <path d="M45,160 Q65,130 80,100" />
        <path d="M50,70 C65,60 75,75 55,85 Z" />
        <path d="M80,100 C95,90 105,110 85,120 Z" />
        <path d="M45,20 C35,15 30,30 40,35 C45,35 55,25 45,20" />
        <circle cx="45" cy="20" r="1.5" fill="currentColor"/>
        
        <!-- 左側小野貓 (已恢復為靜態插圖) -->
        <g>
            <path d="M10,165 C10,150 28,148 35,165 Z" />
            <circle cx="32" cy="148" r="4.5" />
            <path d="M29,145 L27,138 L32,143 M35,145 L37,138 L32,143" />
            <path d="M10,160 C5,155 0,165 5,168" /> 
        </g>
    </svg>

    <!-- 固定位置邊角插畫：右下角古典柱與山貓 -->
    <svg class="fixed-decor decor-right sketchy-svg" viewBox="0 0 100 150" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M15,90 L85,90 M20,86 L80,86" />
        <circle cx="20" cy="90" r="6" />
        <path d="M20,90 Q20,86 16,86" />
        <circle cx="80" cy="90" r="6" />
        <path d="M80,90 Q80,86 84,86" />
        <line x1="30" y1="96" x2="30" y2="140" />
        <line x1="70" y1="96" x2="70" y2="140" />
        <line x1="38" y1="96" x2="38" y2="140" />
        <line x1="46" y1="96" x2="46" y2="140" />
        <line x1="54" y1="96" x2="54" y2="140" />
        <line x1="62" y1="96" x2="62" y2="140" />
        <path d="M25,140 L75,140 M20,144 L80,144 M15,148 L85,148" />
        
        <!-- 動態山貓群組 -->
        <g class="sitting-lynx">
            <path d="M38,86 C32,60 50,48 55,50 C60,52 68,58 65,72 C63,80 58,86 58,86" />
            <circle cx="58" cy="42" r="7" />
            <path d="M53,38 L48,25 L58,34 M63,38 L68,25 L58,34" />
            <line x1="48" y1="25" x2="46" y2="20" />
            <line x1="68" y1="25" x2="70" y2="20" />
            <path class="cat-tail-right" d="M38,76 C25,74 25,60 30,55" />
        </g>
    </svg>

    <div class="frame">
        <header>
            <div class="header-icon">
                <svg class="sketchy-svg" viewBox="0 0 80 80" width="60" height="60" fill="none" stroke="var(--accent-color)" stroke-width="1.5">
                    <path d="M25,70 C25,40 35,35 40,35 C45,35 55,40 55,70" />
                    <circle cx="40" cy="28" r="9" />
                    <path d="M33,21 L25,7 L38,17 M47,21 L55,7 L42,17" />
                    <line x1="25" y1="7" x2="23" y2="1" />
                    <line x1="55" y1="7" x2="57" y2="1" />
                    <path d="M25,60 C10,55 15,40 25,45" />
                    <line x1="15" y1="70" x2="65" y2="70" />
                </svg>
            </div>
            <h1>排放交易計畫的邊境調整</h1>
            <div class="subtitle">The Border Adjustments of Emissions Trading Schemes</div>
        </header>

        <nav class="nav-container" id="nav-menu">
            <div class="nav-item">
                <button class="nav-btn active trigger-btn" data-target="intro">7.1 導言</button>
            </div>
            <div class="nav-item">
                <button class="nav-btn trigger-btn" data-target="comparison">7.2 政策比較</button>
            </div>
            
            <div class="nav-item">
                <button class="nav-btn cursor-default">7.3 課稅原則</button>
                <div class="dropdown-content">
                    <button class="dropdown-btn trigger-btn" data-target="taxation_1">7.3.1 課稅比較</button>
                    <button class="dropdown-btn trigger-btn" data-target="taxation_2">7.3.2 WTO 規則</button>
                    <button class="dropdown-btn trigger-btn" data-target="taxation_3">7.3.3 直接與間接稅</button>
                </div>
            </div>

            <div class="nav-item">
                <button class="nav-btn cursor-default">7.4 規範衝突</button>
                <div class="dropdown-content">
                    <button class="dropdown-btn trigger-btn" data-target="wto_1">7.4.1 排放責任</button>
                    <button class="dropdown-btn trigger-btn" data-target="wto_2">7.4.2 投入品與排放</button>
                    <button class="dropdown-btn trigger-btn" data-target="wto_3">7.4.3 責任構成稅收？</button>
                    <button class="dropdown-btn trigger-btn" data-target="wto_4">7.4.4 GATT 例外條款</button>
                </div>

            <div class="nav-item">
                <button class="nav-btn trigger-btn" data-target="conclusion">7.5 結論</button>
            </div>
        </nav>

        <main class="content-area" id="content-display">
            <!-- 內容由 JavaScript 動態載入 -->
        </main>

        <div class="footer-info">
            <div>CLIMATE POLICY</div>
            <div>INTERNATIONAL TRADE LAW</div>
            <div>WTO COMPLIANCE</div>
        </div>
    </div>

    <script>
        const contentData = {
            intro: `
                <h2 class="section-title">7.1 導言</h2>
                <p><strong>氣候變遷</strong>為全球性議題，其應對策略理應具備全球一致性。此一學術觀點催生了支持「<strong>目的地課稅原則</strong>」（Destination Principle）的探討——即無論商品產地為何，均應於其消費地進行課稅。</p>
                <div class="highlight-box">
                    <span class="box-title">核心概念</span>
                    若將目的地原則適用於<strong>排放交易計畫</strong>（Emissions Trading Scheme, ETS），其監管將衍生出「<strong>邊境稅調整</strong>」（Border Tax Adjustment）機制：對進口產品的溫室氣體（GHG）排放徵收費用，同時對出口產品退還已繳納之費用。

                <p><strong>核心法律爭點：</strong><br>
